<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS+Organizer | Vanilla</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%238b5cf6'/><text x='50' y='72' font-family='sans-serif' font-size='70' fill='white' text-anchor='middle' font-weight='900'>+</text></svg>">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Content will be injected by JavaScript -->
    </div>

    <!-- Global Toggle (Persistent) -->
    <div class="controls">
        <button id="toggle-layout-btn" class="toggle-btn active">
            <span class="toggle-label">⏫ Layout: 2 LINES</span>
            <div class="toggle-switch"></div>
        </button>
        <button id="toggle-borders-btn" class="toggle-btn active">
            <span class="toggle-label">✨ Colored Borders: ON</span>
            <div class="toggle-switch"></div>
        </button>
    </div>

    <script type="module" src="scripts/app.js"></script>
</body>
</html>
